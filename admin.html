<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>slowbuild 商品管理后台</title>
<style>
:root{--bg:#f5f5f0;--surface:#fff;--text:#1a1a1a;--muted:#888;--border:#e0e0d8;--accent:#e87d4b;--green:#2e8b57;--red:#d94a4a;--blue:#4a90d9;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.topbar .logo{font-weight:700;font-size:1.05rem;white-space:nowrap}
.topbar .logo span{color:var(--accent)}
.topbar input{flex:1;max-width:420px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:.82rem;outline:none}
.topbar input:focus{border-color:var(--accent)}
.topbar .conn{font-size:.75rem;padding:4px 10px;border-radius:12px;font-weight:500}
.conn.on{background:#e8f5e9;color:var(--green)}
.conn.off{background:#fef0f0;color:var(--red)}
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:12px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.sidebar button{display:block;width:100%;text-align:left;padding:10px 14px;border:none;background:none;border-radius:8px;font-size:.87rem;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s}
.sidebar button:hover{background:#f0f0eb}
.sidebar button.active{background:var(--text);color:#fff}
.main{flex:1;padding:24px;overflow-y:auto}
h2{font-size:1.25rem;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.col3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:.78rem;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:.83rem;font-family:inherit;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}
.form-group textarea{min-height:60px;resize:vertical}
.btn{padding:8px 20px;border-radius:6px;font-size:.83rem;font-weight:500;font-family:inherit;cursor:pointer;border:none;transition:all .15s}
.btn.primary{background:var(--text);color:#fff}
.btn.primary:hover{opacity:.85}
.btn.accent{background:var(--accent);color:#fff}
.btn.accent:hover{opacity:.85}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn.outline:hover{border-color:#bbb}
.btn.danger{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn.danger:hover{background:var(--red);color:#fff}
.btn.sm{padding:4px 12px;font-size:.75rem}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg);border-radius:8px;margin-bottom:8px;gap:12px}
.list-item .id{font-weight:600;min-width:80px;font-size:.85rem}
.list-item .name{flex:1;font-size:.85rem;color:var(--text)}
.list-item .meta{font-size:.78rem;color:var(--muted);min-width:80px;text-align:right}
.list-item .price{font-weight:600;color:var(--accent);min-width:60px;text-align:right}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:500}
.badge.physical{background:#e8f0fe;color:#4a90d9}
.badge.digital{background:#e8f5e9;color:#2e8b57}
.badge.course{background:#fff3e0;color:#e87d4b}
.empty{text-align:center;padding:40px;color:var(--muted)}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:.83rem;z-index:100;animation:fadeIn .3s}
.toast.ok{background:#e8f5e9;color:var(--green);border:1px solid #b7e4c7}
.toast.err{background:#fef0f0;color:var(--red);border:1px solid #f5c6cb}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.spacer{flex:1}
.syllabus-item{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.syllabus-item input{flex:1}
@media(max-width:768px){.layout{flex-direction:column}.sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:8px}.sidebar button{white-space:nowrap}.form-grid,.form-grid.col3{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <div class="logo"><span>●</span> slowbuild 控制台</div>
  <input type="text" id="apiUrl" placeholder="后端地址，如 http://localhost:5000" onchange="saveApiUrl()">
  <span class="conn off" id="connStatus">未连接</span>
  <button class="btn sm outline" onclick="testConn()">测试连接</button>
</div>

<div class="layout">
  <!-- 侧边栏 -->
  <div class="sidebar">
    <button class="active" data-page="products" onclick="switchPage('products')">📦 商品管理</button>
    <button data-page="courses" onclick="switchPage('courses')">📚 课程管理</button>
    <button data-page="orders" onclick="switchPage('orders')">📋 订单管理</button>
    <button data-page="settings" onclick="switchPage('settings')">⚙️ 设置</button>
  </div>

  <!-- 主内容 -->
  <div class="main">

    <!-- ══════ 商品管理 ══════ -->
    <div id="page-products">
      <h2>📦 商品管理</h2>
      <div id="productList"></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn primary" onclick="showProductForm()">➕ 添加商品</button>
      <button class="btn outline" onclick="quickTemplate()" style="margin-left:8px">📋 快速模板</button>
        <button class="btn outline" onclick="refreshAll()">🔄 刷新</button>
      </div>
    </div>

    <!-- ══════ 课程管理 ══════ -->
    <div id="page-courses" style="display:none">
      <h2>📚 课程管理</h2>
      <div id="courseList"></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn primary" onclick="showCourseForm()">➕ 添加课程</button>
        <button class="btn outline" onclick="refreshAll()">🔄 刷新</button>
      </div>
    </div>

    <!-- ══════ 订单管理 ══════ -->
    <div id="page-orders" style="display:none">
      <h2>📋 订单管理 <span id="orderStats" style="font-size:.8rem;color:var(--muted);font-weight:400;margin-left:12px"></span></h2>
      <div class="btn-row" style="margin-bottom:12px">
        <button class="btn primary sm" style="background:var(--green)" onclick="filterOrders('')">全部</button>
        <button class="btn outline sm" onclick="filterOrders('pending')">⏳ 待确认</button>
        <button class="btn outline sm" onclick="filterOrders('confirmed')">✅ 已确认</button>
        <button class="btn outline sm" onclick="refreshOrders()">🔄 刷新</button>
      </div>
      <div id="orderList"></div>
    </div>

    <!-- ══════ 设置 ══════ -->
    <div id="page-settings" style="display:none">
      <h2>⚙️ 设置</h2>
      <div class="card">
        <div class="card-label">默认收款链接 (海外)</div>
        <div class="form-group">
          <label>新商品默认海外收款链接 (Payoneer)</label>
          <input type="text" id="defaultBuyLink" placeholder="https://link.payoneer.com/Token?t=..." onchange="saveSettings()">
        </div>
      </div>
      <div class="card">
        <div class="card-label">默认收款方式 (国内)</div>
        <div class="form-group">
          <label>新商品默认国内收款图片路径</label>
          <input type="text" id="defaultBuyLinkCN" placeholder="images/alipay-qr.jpg" onchange="saveSettings()">
        </div>
      </div>
      <div class="card">
        <div class="card-label">默认图片路径前缀</div>
        <div class="form-group">
          <label>新商品默认图片路径</label>
          <input type="text" id="defaultImage" placeholder="images/product.jpg" onchange="saveSettings()">
        </div>
      </div>
      <div class="card">
        <div class="card-label">数据导出</div>
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:10px">将所有商品和课程数据导出为 JSON，可用于备份或迁移</p>
        <button class="btn outline" onclick="exportData()">📥 导出 JSON</button>
      </div>
    </div>

  </div>
</div>

<!-- ══════ 商品编辑弹窗 ══════ -->
<div id="productModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:50;overflow-y:auto">
<div style="max-width:700px;margin:40px auto;background:var(--surface);border-radius:var(--radius);padding:24px">
  <h2 style="margin-bottom:16px" id="productModalTitle">添加商品</h2>
  <input type="hidden" id="pId">
  <div class="form-group" style="margin-bottom:10px">
    <label>类型</label>
    <select id="pType"><option value="physical">实物商品</option><option value="digital">数字产品</option></select>
  </div>
  <div class="form-grid">
    <div class="form-group"><label>商品名 (EN)</label><input id="pNameEN" placeholder="Product name"></div>
    <div class="form-group"><label>商品名 (简体)</label><input id="pNameCN" placeholder="商品名"></div>
    <div class="form-group"><label>商品名 (繁体)</label><input id="pNameTW" placeholder="商品名"></div>
  </div>
  <div class="form-grid">
    <div class="form-group"><label>价格 USD</label><input id="pPrice" type="number" step="0.01" min="0" placeholder="9.99"></div>
    <div class="form-group"><label>图片路径</label><input id="pImage" placeholder="images/xxx.jpg"><input type="file" id="pImageFile" accept="image/*" style="margin-top:4px;font-size:.78rem" onchange="uploadImage()"><span id="pImageUploading" style="display:none;font-size:.75rem;color:var(--muted)">⏳ 上传中...</span></div>
    <div class="form-group"><label>收款链接 (Payoneer / 海外)</label><input id="pBuyLink" placeholder="https://link.payoneer.com/Token?t=..."></div>
    <div class="form-group"><label>国内收款图片 (支付宝/微信)</label><input id="pBuyLinkCN" placeholder="images/alipay-qr.jpg"></div>
  </div>
  <div class="form-group" style="margin:10px 0"><label>描述 (EN)</label><textarea id="pDescEN" placeholder="Product description"></textarea></div>
  <div class="form-grid">
    <div class="form-group"><label>描述 (简体)</label><textarea id="pDescCN" placeholder="商品描述"></textarea></div>
    <div class="form-group"><label>描述 (繁体)</label><textarea id="pDescTW" placeholder="商品描述"></textarea></div>
  </div>
  <div class="card-label" style="margin-top:12px">规格说明（每行一条，三语对应）</div>
  <div id="pSpecs" style="margin-bottom:10px"></div>
  <button class="btn sm outline" onclick="addSpecRow()">+ 添加规格行</button>
  <div class="form-grid col3" style="margin-top:12px">
    <div class="form-group"><label>物流说明 (EN)</label><input id="pShipEN" placeholder="Free worldwide shipping"></div>
    <div class="form-group"><label>物流说明 (简体)</label><input id="pShipCN" placeholder="全球包邮"></div>
    <div class="form-group"><label>物流说明 (繁体)</label><input id="pShipTW" placeholder="全球包郵"></div>
  </div>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn primary" onclick="saveProduct()">✅ 保存</button>
    <button class="btn outline" onclick="closeProductModal()">取消</button>
    <span class="spacer"></span>
    <button class="btn danger sm" id="pDeleteBtn" style="display:none" onclick="deleteProduct()">🗑️ 删除此商品</button>
  </div>
  <div id="pMsg" style="margin-top:8px;font-size:.82rem"></div>
</div>
</div>

<!-- ══════ 课程编辑弹窗 ══════ -->
<div id="courseModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:50;overflow-y:auto">
<div style="max-width:700px;margin:40px auto;background:var(--surface);border-radius:var(--radius);padding:24px">
  <h2 style="margin-bottom:16px" id="courseModalTitle">添加课程</h2>
  <input type="hidden" id="cId">
  <div class="form-grid">
    <div class="form-group"><label>课程名 (EN)</label><input id="cTitleEN" placeholder="Course title"></div>
    <div class="form-group"><label>课程名 (简体)</label><input id="cTitleCN" placeholder="课程名"></div>
    <div class="form-group"><label>课程名 (繁体)</label><input id="cTitleTW" placeholder="課程名"></div>
  </div>
  <div class="form-grid">
    <div class="form-group"><label>价格 USD</label><input id="cPrice" type="number" step="0.01" min="0" placeholder="19.99"></div>
    <div class="form-group"><label>节数</label><input id="cLessonCount" type="number" min="0" placeholder="6"></div>
    <div class="form-group"><label>总时长</label><input id="cDuration" placeholder="2h 30min"></div>
  </div>
  <div class="form-grid">
    <div class="form-group"><label>封面图片</label><input id="cImage" placeholder="images/course.jpg"></div>
    <div class="form-group"><label>预览视频 URL</label><input id="cVideoPreview" placeholder="https://youtube.com/..."></div>
    <div class="form-group"><label>收款链接 (Payoneer / 海外)</label><input id="cBuyLink" placeholder="https://link.payoneer.com/Token?t=..."></div>
  </div>
  <div class="form-group" style="margin:10px 0"><label>描述 (EN)</label><textarea id="cDescEN" placeholder="What students will learn..."></textarea></div>
  <div class="form-grid">
    <div class="form-group"><label>描述 (简体)</label><textarea id="cDescCN" placeholder="学员将学到..."></textarea></div>
    <div class="form-group"><label>描述 (繁体)</label><textarea id="cDescTW" placeholder="學員將學到..."></textarea></div>
  </div>
  <div class="card-label" style="margin-top:12px">课程大纲</div>
  <div id="cSyllabus" style="margin-bottom:10px"></div>
  <button class="btn sm outline" onclick="addSyllabusRow()">+ 添加课时</button>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn primary" onclick="saveCourse()">✅ 保存</button>
    <button class="btn outline" onclick="closeCourseModal()">取消</button>
    <span class="spacer"></span>
    <button class="btn danger sm" id="cDeleteBtn" style="display:none" onclick="deleteCourse()">🗑️ 删除此课程</button>
  </div>
  <div id="cMsg" style="margin-top:8px;font-size:.82rem"></div>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast" style="display:none"></div>

<script>
// ══════════════════════════════════
// Config
// ══════════════════════════════════
var editingProductId = null;
var editingCourseId = null;

function apiUrl(){
  return (document.getElementById('apiUrl').value.trim() || localStorage.getItem('sb_api_url') || '').replace(/\/+$/,'');
}
function saveApiUrl(){
  localStorage.setItem('sb_api_url', document.getElementById('apiUrl').value.trim());
}
function api(path, method, body){
  var u = apiUrl();
  if(!u){ toast('请先填写后端地址','err'); return Promise.reject('no url'); }
  var opt = {method:method||'GET', headers:{'Content-Type':'application/json'}};
  if(body) opt.body = JSON.stringify(body);
  return fetch(u+path, opt).then(function(r){
    return r.json().then(function(d){ if(!r.ok) throw new Error(d.error||'请求失败'); return d; });
  });
}

// ══════════════════════════════════
// Init
// ══════════════════════════════════
(function init(){
  document.getElementById('apiUrl').value = localStorage.getItem('sb_api_url')||'';
  document.getElementById('defaultBuyLink').value = localStorage.getItem('sb_default_buy_link')||'';
  document.getElementById('defaultBuyLinkCN').value = localStorage.getItem('sb_default_buy_link_cn')||'';
  document.getElementById('defaultImage').value = localStorage.getItem('sb_default_image')||'images/product.jpg';
  var u = apiUrl();
  if(u){ testConn(); }
  else { refreshAll(); }
})();

function testConn(){
  setConnStatus('connecting');
  api('/health').then(function(d){
    setConnStatus('on', '✅ 已连接');
    refreshAll();
  }).catch(function(){
    setConnStatus('off', '❌ 无法连接');
  });
}
function setConnStatus(cls, text){
  var el = document.getElementById('connStatus');
  el.className = 'conn '+cls;
  el.textContent = text||(cls==='on'?'已连接':'未连接');
}

function refreshAll(){
  loadProducts();
  loadCourses();
}

// ══════════════════════════════════
// Page Switching
// ══════════════════════════════════
function switchPage(page){
  document.querySelectorAll('#page-products,#page-courses,#page-orders,#page-settings').forEach(function(p){p.style.display='none'});
  document.getElementById('page-'+page).style.display='block';
  document.querySelectorAll('.sidebar button').forEach(function(b){b.classList.remove('active')});
  document.querySelector('[data-page="'+page+'"]').classList.add('active');
}

// ══════════════════════════════════
// Products
// ══════════════════════════════════
var _products = [];
function loadProducts(){
  var el = document.getElementById('productList');
  el.innerHTML = '<div class="empty">加载中...</div>';
  api('/api/admin/products').then(function(data){
    _products = data;
    renderProductList();
  }).catch(function(e){
    if(apiUrl()){ el.innerHTML = '<div class="empty">❌ 加载失败: '+e.message+'</div>'; }
    else { el.innerHTML = '<div class="empty">📡 请先填写后端地址并测试连接</div>'; }
  });
}

function renderProductList(){
  var el = document.getElementById('productList');
  if(!_products.length){ el.innerHTML = '<div class="empty">📭 暂无商品，点击下方按钮添加</div>'; return; }
  var h = '';
  _products.forEach(function(p){
    var badge = '<span class="badge '+p.type+'">'+(p.type==='digital'?'数字':'实物')+'</span>';
    h += '<div class="list-item">'+
      '<div class="id">'+p.id+'</div>'+
      '<div class="name">'+badge+' '+p.name['zh-CN']+'</div>'+
      '<div class="price">$'+p.price.toFixed(2)+'</div>'+
      '<div class="btn-row">'+
        '<button class="btn sm outline" onclick="editProduct(\''+p.id+'\')">✏️ 编辑</button>'+
        '<button class="btn sm outline" onclick="copyProduct(\''+p.id+'\')">📋 复制</button>'+
      '</div></div>';
  });
  el.innerHTML = h;
}


function quickTemplate(){
  showProductForm();
  // Pre-fill common fields
  document.getElementById('pType').value = 'digital';
  document.getElementById('pPrice').value = '4.99';
  document.getElementById('pNameEN').placeholder = '例: Image Compressor';
  document.getElementById('pNameCN').placeholder = '例: 图片压缩器';
  document.getElementById('pDescEN').placeholder = 'Describe what this tool does...';
  document.getElementById('pDescCN').placeholder = '描述这个工具的功能...';
  document.getElementById('pShipEN').value = '📦 Instant digital delivery';
  document.getElementById('pShipCN').value = '📦 即时数字交付';
  document.getElementById('pShipTW').value = '📦 即時數位交付';
  document.getElementById('pMsg').textContent = '💡 已填入模板，修改后保存即可';
}
function showProductForm(){
  document.getElementById('productModalTitle').textContent = '➕ 添加商品';
  document.getElementById('pId').value = '';
  document.getElementById('pType').value = 'digital';
  document.getElementById('pNameEN').value = '';
  document.getElementById('pNameCN').value = '';
  document.getElementById('pNameTW').value = '';
  document.getElementById('pPrice').value = '9.99';
  document.getElementById('pImage').value = localStorage.getItem('sb_default_image')||'';
  document.getElementById('pBuyLink').value = localStorage.getItem('sb_default_buy_link')||'';
  document.getElementById('pBuyLinkCN').value = localStorage.getItem('sb_default_buy_link_cn')||'';
  document.getElementById('pDescEN').value = '';
  document.getElementById('pDescCN').value = '';
  document.getElementById('pDescTW').value = '';
  document.getElementById('pShipEN').value = '';
  document.getElementById('pShipCN').value = '';
  document.getElementById('pShipTW').value = '';
  document.getElementById('pSpecs').innerHTML = '';
  document.getElementById('pDeleteBtn').style.display = 'none';
  document.getElementById('pMsg').textContent = '';
  editingProductId = null;
  document.getElementById('productModal').style.display = 'block';
}

function editProduct(id){
  var p = _products.find(function(x){return x.id===id;});
  if(!p) return;
  document.getElementById('productModalTitle').textContent = '✏️ 编辑: '+p.id;
  document.getElementById('pId').value = p.id;
  document.getElementById('pType').value = p.type||'digital';
  document.getElementById('pNameEN').value = p.name.en||'';
  document.getElementById('pNameCN').value = p.name['zh-CN']||'';
  document.getElementById('pNameTW').value = p.name['zh-TW']||'';
  document.getElementById('pPrice').value = p.price||0;
  document.getElementById('pImage').value = p.image||'';
  document.getElementById('pBuyLink').value = p.buyLink||'';
  document.getElementById('pBuyLinkCN').value = p.buyLinkCN||'';
  document.getElementById('pDescEN').value = p.desc.en||'';
  document.getElementById('pDescCN').value = p.desc['zh-CN']||'';
  document.getElementById('pDescTW').value = p.desc['zh-TW']||'';
  document.getElementById('pShipEN').value = (p.shipping||{}).en||'';
  document.getElementById('pShipCN').value = (p.shipping||{})['zh-CN']||'';
  document.getElementById('pShipTW').value = (p.shipping||{})['zh-TW']||'';
  document.getElementById('pDeleteBtn').style.display = '';
  document.getElementById('pMsg').textContent = '';
  editingProductId = id;
  // Render specs
  var specs = p.specs||[];
  var max = Math.max(specs.en?specs.en.length:0, specs['zh-CN']?specs['zh-CN'].length:0, specs['zh-TW']?specs['zh-TW'].length:0, 1);
  var h = '';
  for(var i=0;i<max;i++){
    h += '<div class="syllabus-item">'+
      '<input placeholder="规格 EN" value="'+esc((specs.en||[])[i]||'')+'">'+
      '<input placeholder="简体" value="'+esc((specs['zh-CN']||[])[i]||'')+'">'+
      '<input placeholder="繁体" value="'+esc((specs['zh-TW']||[])[i]||'')+'">'+
      '<button class="btn sm danger" onclick="this.parentElement.remove()">✕</button></div>';
  }
  document.getElementById('pSpecs').innerHTML = h;
  document.getElementById('productModal').style.display = 'block';
}

function saveProduct(){
  var id = document.getElementById('pId').value.trim();
  if(!id){ id = prompt('商品 ID（英文标识，如 word2pdf）：'); if(!id) return; }
  
  var specsEn = [], specsCN = [], specsTW = [];
  document.querySelectorAll('#pSpecs .syllabus-item').forEach(function(row){
    var inputs = row.querySelectorAll('input');
    if(inputs[0].value||inputs[1].value||inputs[2].value){
      specsEn.push(inputs[0].value);
      specsCN.push(inputs[1].value);
      specsTW.push(inputs[2].value);
    }
  });

  var data = {
    id: id,
    type: document.getElementById('pType').value,
    name: {en:document.getElementById('pNameEN').value, 'zh-CN':document.getElementById('pNameCN').value, 'zh-TW':document.getElementById('pNameTW').value},
    desc: {en:document.getElementById('pDescEN').value, 'zh-CN':document.getElementById('pDescCN').value, 'zh-TW':document.getElementById('pDescTW').value},
    price: parseFloat(document.getElementById('pPrice').value)||0,
    image: document.getElementById('pImage').value.trim(),
    buyLink: document.getElementById('pBuyLink').value.trim(),
    buyLinkCN: document.getElementById('pBuyLinkCN').value.trim(),
    specs: {en:specsEn, 'zh-CN':specsCN, 'zh-TW':specsTW},
    shipping: {en:document.getElementById('pShipEN').value, 'zh-CN':document.getElementById('pShipCN').value, 'zh-TW':document.getElementById('pShipTW').value}
  };

  var promise = editingProductId ? api('/api/admin/products/'+editingProductId, 'PUT', data) : api('/api/admin/products', 'POST', data);
  promise.then(function(){
    closeProductModal();
    loadProducts();
    toast('✅ 保存成功');
  }).catch(function(e){
    document.getElementById('pMsg').textContent = '❌ '+e.message;
  });
}

function copyProduct(id){
  var p = _products.find(function(x){return x.id===id;});
  if(!p) return;
  var newId = prompt('新商品 ID：', id+'_copy');
  if(!newId) return;
  var data = JSON.parse(JSON.stringify(p));
  data.id = newId;
  delete data.created_at; delete data.updated_at;
  api('/api/admin/products', 'POST', data).then(function(){
    loadProducts();
    toast('✅ 已复制');
  }).catch(function(e){ toast('❌ '+e.message,'err'); });
}

function deleteProduct(){
  if(!editingProductId) return;
  if(!confirm('确定删除商品 "'+editingProductId+'"？此操作不可恢复。')) return;
  api('/api/admin/products/'+editingProductId, 'DELETE').then(function(){
    closeProductModal();
    loadProducts();
    toast('🗑️ 已删除');
  }).catch(function(e){ toast('❌ '+e.message,'err'); });
}

function closeProductModal(){
  document.getElementById('productModal').style.display = 'none';
  editingProductId = null;
}
function addSpecRow(){
  var div = document.createElement('div'); div.className='syllabus-item';
  div.innerHTML = '<input placeholder="规格 EN"><input placeholder="简体"><input placeholder="繁体"><button class="btn sm danger" onclick="this.parentElement.remove()">✕</button>';
  document.getElementById('pSpecs').appendChild(div);
}

// ══════════════════════════════════
// Courses
// ══════════════════════════════════
var _courses = [];
function loadCourses(){
  api('/api/admin/courses').then(function(data){
    _courses = data;
    renderCourseList();
  }).catch(function(){});
}

function renderCourseList(){
  var el = document.getElementById('courseList');
  if(!_courses.length){ el.innerHTML = '<div class="empty">📭 暂无课程，点击下方按钮添加</div>'; return; }
  var h = '';
  _courses.forEach(function(c){
    h += '<div class="list-item">'+
      '<div class="id">'+c.id+'</div>'+
      '<div class="name"><span class="badge course">课程</span> '+c.title['zh-CN']+'</div>'+
      '<div class="meta">'+c.lessonCount+'节 · '+c.duration+'</div>'+
      '<div class="price">$'+c.price.toFixed(2)+'</div>'+
      '<div class="btn-row">'+
        '<button class="btn sm outline" onclick="editCourse(\''+c.id+'\')">✏️ 编辑</button>'+
      '</div></div>';
  });
  el.innerHTML = h;
}

function showCourseForm(){
  document.getElementById('courseModalTitle').textContent = '➕ 添加课程';
  document.getElementById('cId').value = '';
  document.getElementById('cTitleEN').value=''; document.getElementById('cTitleCN').value=''; document.getElementById('cTitleTW').value='';
  document.getElementById('cPrice').value='19.99';
  document.getElementById('cLessonCount').value=''; document.getElementById('cDuration').value='';
  document.getElementById('cImage').value=''; document.getElementById('cVideoPreview').value='';
  document.getElementById('cBuyLink').value = localStorage.getItem('sb_default_buy_link')||'';
  document.getElementById('cDescEN').value=''; document.getElementById('cDescCN').value=''; document.getElementById('cDescTW').value='';
  document.getElementById('cSyllabus').innerHTML='';
  document.getElementById('cDeleteBtn').style.display='none';
  document.getElementById('cMsg').textContent='';
  editingCourseId = null;
  document.getElementById('courseModal').style.display='block';
}

function editCourse(id){
  var c = _courses.find(function(x){return x.id===id;});
  if(!c) return;
  document.getElementById('courseModalTitle').textContent = '✏️ 编辑: '+c.id;
  document.getElementById('cId').value = c.id;
  document.getElementById('cTitleEN').value=c.title.en||''; document.getElementById('cTitleCN').value=c.title['zh-CN']||''; document.getElementById('cTitleTW').value=c.title['zh-TW']||'';
  document.getElementById('cPrice').value=c.price||0;
  document.getElementById('cLessonCount').value=c.lessonCount||''; document.getElementById('cDuration').value=c.duration||'';
  document.getElementById('cImage').value=c.image||''; document.getElementById('cVideoPreview').value=c.videoPreview||'';
  document.getElementById('cBuyLink').value=c.buyLink||'';
  document.getElementById('cDescEN').value=c.desc.en||''; document.getElementById('cDescCN').value=c.desc['zh-CN']||''; document.getElementById('cDescTW').value=c.desc['zh-TW']||'';
  document.getElementById('cDeleteBtn').style.display='';
  document.getElementById('cMsg').textContent='';
  editingCourseId = id;
  // Render syllabus
  var syl = c.syllabus||[];
  var h = '';
  syl.forEach(function(s,i){
    h += '<div class="syllabus-item">'+
      '<span style="min-width:30px;font-size:.8rem;color:var(--muted)">#'+(i+1)+'</span>'+
      '<input placeholder="课时名 EN" value="'+esc(s.en||'')+'">'+
      '<input placeholder="简体" value="'+esc(s['zh-CN']||'')+'">'+
      '<input placeholder="繁体" value="'+esc(s['zh-TW']||'')+'">'+
      '<button class="btn sm danger" onclick="this.parentElement.remove()">✕</button></div>';
  });
  document.getElementById('cSyllabus').innerHTML = h;
  document.getElementById('courseModal').style.display='block';
}

function saveCourse(){
  var id = document.getElementById('cId').value.trim();
  if(!id){ id = prompt('课程 ID（英文标识，如 office101）：'); if(!id) return; }

  var syllabus = [];
  document.querySelectorAll('#cSyllabus .syllabus-item').forEach(function(row){
    var inputs = row.querySelectorAll('input');
    if(inputs[0].value||inputs[1].value||inputs[2].value){
      syllabus.push({en:inputs[0].value, 'zh-CN':inputs[1].value, 'zh-TW':inputs[2].value});
    }
  });

  var data = {
    id: id,
    title: {en:document.getElementById('cTitleEN').value, 'zh-CN':document.getElementById('cTitleCN').value, 'zh-TW':document.getElementById('cTitleTW').value},
    desc: {en:document.getElementById('cDescEN').value, 'zh-CN':document.getElementById('cDescCN').value, 'zh-TW':document.getElementById('cDescTW').value},
    price: parseFloat(document.getElementById('cPrice').value)||0,
    image: document.getElementById('cImage').value.trim(),
    buyLink: document.getElementById('cBuyLink').value.trim(),
    videoPreview: document.getElementById('cVideoPreview').value.trim(),
    lessonCount: parseInt(document.getElementById('cLessonCount').value)||syllabus.length,
    duration: document.getElementById('cDuration').value.trim(),
    syllabus: syllabus
  };

  var promise = editingCourseId ? api('/api/admin/courses/'+editingCourseId, 'PUT', data) : api('/api/admin/courses', 'POST', data);
  promise.then(function(){
    closeCourseModal();
    loadCourses();
    toast('✅ 课程已保存');
  }).catch(function(e){
    document.getElementById('cMsg').textContent = '❌ '+e.message;
  });
}

function deleteCourse(){
  if(!editingCourseId) return;
  if(!confirm('确定删除课程 "'+editingCourseId+'"？')) return;
  api('/api/admin/courses/'+editingCourseId, 'DELETE').then(function(){
    closeCourseModal();
    loadCourses();
    toast('🗑️ 已删除');
  }).catch(function(e){ toast('❌ '+e.message,'err'); });
}

function closeCourseModal(){
  document.getElementById('courseModal').style.display = 'none';
  editingCourseId = null;
}
function addSyllabusRow(){
  var div = document.createElement('div'); div.className='syllabus-item';
  var n = document.querySelectorAll('#cSyllabus .syllabus-item').length + 1;
  div.innerHTML = '<span style="min-width:30px;font-size:.8rem;color:var(--muted)">#'+n+'</span><input placeholder="课时名 EN"><input placeholder="简体"><input placeholder="繁体"><button class="btn sm danger" onclick="this.parentElement.remove()">✕</button>';
  document.getElementById('cSyllabus').appendChild(div);
}

// Settings
// ══════════════════════════════════
function saveSettings(){
  localStorage.setItem('sb_default_buy_link', document.getElementById('defaultBuyLink').value.trim());
  localStorage.setItem('sb_default_buy_link_cn', document.getElementById('defaultBuyLinkCN').value.trim());

  var u = apiUrl();
  if(!u){ toast('请先连接后端','err'); return; }
  window.open(u+'/api/shop', '_blank');
}

// ══════════════════════════════════
// Utils
// ══════════════════════════════════
function toast(msg, type){
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast '+(type||'ok'); el.style.display='block';
  clearTimeout(el._t); el._t = setTimeout(function(){el.style.display='none'}, 2500);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════
// Image Upload
// ══════════════════════════════════
function uploadImage(){
  var file = document.getElementById('pImageFile').files[0];
  if(!file) return;
  var u = apiUrl();
  if(!u){ toast('请先连接后端','err'); return; }

  var reader = new FileReader();
  document.getElementById('pImageUploading').style.display = 'inline';
  reader.onload = function(){
    api('/api/upload-image', 'POST', {
      filename: file.name,
      content: reader.result.split(',')[1]  // strip data:xxx;base64, prefix
    }).then(function(res){
      document.getElementById('pImage').value = res.path;
      document.getElementById('pImageUploading').style.display = 'none';
      toast('✅ 图片已上传: '+res.path);
    }).catch(function(e){
      document.getElementById('pImageUploading').style.display = 'none';
      toast('❌ 上传失败: '+e.message, 'err');
    });
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════
// Orders (connects to order_server.py on port 5002)
// ══════════════════════════════════
var ORDER_URL = (function(){
  var u = document.getElementById('apiUrl').value.trim() || '';
  // Default: same host, port 5002
  return u ? u.replace(/:\d+(\/.*)?$/, ':5002') : window.location.origin.replace(/:\d+/, ':5002') || 'http://localhost:5002';
})();

function orderApi(path, method, body){
  var url = ORDER_URL.replace(/\/+$/, '') + path;
  var opts = {method:method||'GET', headers:{'Content-Type':'application/json'}};
  if(body) opts.body = JSON.stringify(body);
  return fetch(url, opts).then(function(r){ return r.json(); });
}

function refreshOrders(){
  var el = document.getElementById('orderList');
  el.innerHTML = '<div class="empty">加载中...</div>';
  orderApi('/api/orders?limit=200').then(function(orders){
    orderApi('/api/stats').then(function(stats){
      document.getElementById('orderStats').textContent =
        '共 '+stats.total_orders+' 单 | 待确认 '+stats.pending+' | 营收 $'+stats.revenue_usd+' | 今日 '+stats.today_orders;
    }).catch(function(){});
    _orders = orders;
    renderOrderList(orders);
  }).catch(function(e){
    el.innerHTML = '<div class="empty">❌ 订单服务未连接 ('+e.message+')<br><small>确保 Win10 VM 上 order_server.py 正在运行（端口 5002）</small></div>';
  });
}

function filterOrders(status){
  document.querySelectorAll('#page-orders .btn-row button').forEach(function(b,i){
    b.className = i===0 && !status ? 'btn primary sm' : 'btn outline sm';
    if(status && b.textContent.indexOf(status==='pending'?'待确认':status==='confirmed'?'已确认':'')>=0) b.className='btn primary sm';
  });
  orderApi('/api/orders?limit=200').then(function(orders){
    if(status) orders = orders.filter(function(o){ return o.status===status; });
    _orders = orders;
    renderOrderList(orders);
  }).catch(function(){});
}

var _orders = [];
function renderOrderList(orders){
  var el = document.getElementById('orderList');
  if(!orders.length){ el.innerHTML = '<div class="empty">暂无订单</div>'; return; }
  el.innerHTML = orders.map(function(o){
    var badge = o.status==='confirmed' ? '<span class="badge digital">已确认</span>' : '<span class="badge course">待确认</span>';
    var typeBadge = o.product_type==='digital' ? '<span class="badge digital">数字</span>' :
                    o.product_type==='course' ? '<span class="badge course">课程</span>' :
                    '<span class="badge physical">实物</span>';
    var pmColor = o.payment_method==='payoneer'?'#4a90d9':o.payment_method==='paypal'?'#003087':o.payment_method==='alipay'?'#1677ff':'#07c160';
    var pmBadge = '<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:.68rem;background:'+pmColor+';color:#fff">'+o.payment_method+'</span>';
    var email = o.download_sent ? '📧' : '';
    var btns = '';
    if(o.status==='pending'){
      btns = '<button class="btn accent sm" onclick="confirmOrder(\''+o.id+'\')">✅ 确认收款</button>';
    } else {
      btns = '<button class="btn outline sm" onclick="resendOrderEmail(\''+o.id+'\')">📧 重发邮件</button>';
    }
    return '<div class="list-item" style="flex-wrap:wrap">'+
      '<div class="id">#'+o.id.substr(0,8)+'</div>'+
      '<div class="name" style="flex:2">'+o.product_name+' '+typeBadge+' '+email+'</div>'+
      '<div class="name" style="flex:1;font-size:.78rem;color:var(--muted)">'+o.buyer_email+'</div>'+
      '<div class="meta">'+pmBadge+'</div>'+
      '<div class="price">$'+o.price.toFixed(2)+'</div>'+
      '<div style="min-width:60px">'+badge+'</div>'+
      '<div style="min-width:100px">'+btns+'</div>'+
      '</div>';
  }).join('');
}

function confirmOrder(orderId){
  if(!confirm('确认已收到 '+orderId+' 的付款？将自动发送下载链接邮件。')) return;
  orderApi('/api/order/'+orderId+'/confirm', 'POST').then(function(d){
    if(d.ok){
      toast('✅ 已确认'+(d.email_sent?'，邮件已发送':'，但邮件发送失败:'+d.email_error));
      refreshOrders();
    } else {
      toast('❌ '+d.error, 'err');
    }
  }).catch(function(e){
    toast('❌ '+e.message, 'err');
  });
}

function resendOrderEmail(orderId){
  if(!confirm('重发确认邮件给 '+orderId+'？')) return;
  orderApi('/api/order/'+orderId+'/resend', 'POST').then(function(d){
    if(d.ok) toast('✅ 邮件已重发');
    else toast('❌ 发送失败: '+d.error, 'err');
  }).catch(function(e){
    toast('❌ '+e.message, 'err');
  });
}

// Auto-refresh orders when switching to orders tab
var _origSwitchPage = switchPage;
switchPage = function(page){
  if(page==='orders') refreshOrders();
  _origSwitchPage(page);
};
