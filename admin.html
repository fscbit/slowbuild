<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>slowbuild Shop Admin</title>
<style>
  :root{--bg:#fafaf8;--surface:#fff;--text:#1e1e1e;--muted:#666;--border:#e5e5e0;--accent:#e87d4b;--green:#3a8c5c;--red:#c0392b;--radius:10px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:20px;max-width:1100px;margin:0 auto}
  h1{font-size:1.4rem;margin-bottom:20px;display:flex;align-items:center;gap:8px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .card h2{font-size:1.1rem;margin-bottom:12px}
  label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:4px;margin-top:10px}
  input,textarea,select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;font-family:inherit;outline:none;transition:border-color .2s}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  textarea{min-height:80px;resize:vertical}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .btn{padding:8px 20px;border-radius:8px;font-size:.87rem;font-weight:500;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .2s}
  .btn:hover{border-color:#ccc}
  .btn.primary{background:var(--text);color:#fff;border:none}
  .btn.primary:hover{opacity:.85}
  .btn.danger{background:var(--red);color:#fff;border:none}
  .btn.danger:hover{opacity:.85}
  .btn.small{padding:5px 14px;font-size:.78rem}
  .btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .status{font-size:.8rem;padding:8px 12px;border-radius:8px;margin-top:8px;display:none}
  .status.ok{display:block;background:#eef7f0;color:var(--green)}
  .status.err{display:block;background:#fef3f0;color:var(--red)}
  .token-bar{display:flex;gap:8px;align-items:flex-end}
  .token-bar input{flex:1}
  .product-list{display:grid;gap:8px}
  .product-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:8px;gap:12px}
  .product-item strong{min-width:80px}
  .product-item span{color:var(--muted);font-size:.82rem;flex:1}
  .spec-row{display:flex;gap:8px;align-items:center;margin-bottom:4px}
  .spec-row input{flex:1}
  .spec-row button{background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--red);padding:0 4px}
  @media(max-width:700px){.row,.row3{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>🛒 slowbuild Shop Admin</h1>

<!-- Token Setup -->
<div class="card">
  <h2>🔑 GitHub 连接</h2>
  <div class="token-bar">
    <input type="password" id="ghToken" placeholder="GitHub Personal Access Token (classic)">
    <button class="btn primary" onclick="saveToken()">保存</button>
    <button class="btn" onclick="checkToken()">测试连接</button>
  </div>
  <div style="display:flex;gap:12px;margin-top:8px">
    <input id="ghOwner" placeholder="Owner (fscbit)" style="flex:1">
    <input id="ghRepo" placeholder="Repo (slowbuild)" style="flex:1">
    <input id="ghBranch" placeholder="Branch (master)" style="flex:1">
  </div>
  <div class="status" id="tokenStatus"></div>
  <p style="font-size:.75rem;color:var(--muted);margin-top:8px">
    Token 需要 <code>repo</code> 权限。在 GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic) 创建。
  </p>
</div>

<!-- Product List -->
<div class="card">
  <h2>📦 商品列表</h2>
  <div id="productList" class="product-list" style="margin-bottom:12px">加载中...</div>
  <div class="btn-row">
    <button class="btn primary" onclick="addProduct()">➕ 添加商品</button>
    <button class="btn" onclick="loadProducts()">🔄 刷新</button>
    <button class="btn" onclick="saveAll()">💾 保存全部</button>
  </div>
  <div class="status" id="saveStatus"></div>
</div>

<!-- Edit Form -->
<div class="card" id="editCard" style="display:none">
  <h2 id="editTitle">✏️ 编辑商品</h2>
  <input type="hidden" id="editId">
  
  <div class="row3">
    <div><label>商品名 (EN)</label><input id="eNameEN"></div>
    <div><label>商品名 (简体)</label><input id="eNameCN"></div>
    <div><label>商品名 (繁体)</label><input id="eNameTW"></div>
  </div>
  
  <label>描述 (EN)</label><textarea id="eDescEN"></textarea>
  <label>描述 (简体)</label><textarea id="eDescCN"></textarea>
  <label>描述 (繁体)</label><textarea id="eDescTW"></textarea>
  
  <div class="row">
    <div><label>价格 (USD)</label><input id="ePrice" type="number" step="0.01" min="0"></div>
    <div><label>图片路径</label><div style="display:flex;gap:8px"><input id="eImage" placeholder="images/xxx.jpg"><input type="file" id="eImageFile" accept="image/*" style="display:none" onchange="previewImage()"><button class="btn small" onclick="document.getElementById('eImageFile').click()">📁 上传</button></div></div>
  </div>
  
  <label>收款链接</label><input id="eBuyLink" placeholder="Payoneer / Stripe / ...">
  
  <!-- Specs -->
  <div style="margin-top:8px">
    <label>规格说明</label>
    <div class="row" style="gap:4px">
      <div style="font-size:.75rem;color:var(--muted)">EN</div>
      <div style="font-size:.75rem;color:var(--muted)">简体</div>
      <div style="font-size:.75rem;color:var(--muted)">繁体</div>
    </div>
    <div id="specsContainer"></div>
    <button class="btn small" onclick="addSpecRow()" style="margin-top:4px">+ 添加规格</button>
  </div>
  
  <div class="row3" style="margin-top:8px">
    <div><label>物流说明 (EN)</label><input id="eShipEN"></div>
    <div><label>物流说明 (简体)</label><input id="eShipCN"></div>
    <div><label>物流说明 (繁体)</label><input id="eShipTW"></div>
  </div>
  
  <div class="btn-row">
    <button class="btn primary" onclick="saveCurrent()">✅ 保存当前商品</button>
    <button class="btn" onclick="cancelEdit()">取消</button>
    <button class="btn danger small" onclick="deleteCurrent()" style="margin-left:auto">🗑️ 删除</button>
  </div>
  <div class="status" id="editStatus"></div>
</div>

<script>
// ══════════════════════════════════
// Config
// ══════════════════════════════════
var products = [];
var editingIndex = -1;

function gh(){ return {
  token: document.getElementById('ghToken').value.trim(),
  owner: document.getElementById('ghOwner').value.trim() || 'fscbit',
  repo: document.getElementById('ghRepo').value.trim() || 'slowbuild',
  branch: document.getElementById('ghBranch').value.trim() || 'master'
};}

function ghAPI(path, method, body){
  var g = gh();
  return fetch('https://api.github.com/repos/'+g.owner+'/'+g.repo+'/contents/'+path, {
    method: method||'GET',
    headers: {Authorization:'Bearer '+g.token,Accept:'application/vnd.github.v3+json'},
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){ return r.json().then(function(d){ if(!r.ok) throw new Error(d.message||'API error'); return d; }); });
}

// ══════════════════════════════════
// Init
// ══════════════════════════════════
function init(){
  var t = localStorage.getItem('slowbuild_gh_token');
  var o = localStorage.getItem('slowbuild_gh_owner');
  var r = localStorage.getItem('slowbuild_gh_repo');
  if(t) document.getElementById('ghToken').value = t;
  if(o) document.getElementById('ghOwner').value = o;
  if(r) document.getElementById('ghRepo').value = r;
  if(t) loadProducts();
}

function saveToken(){
  var t = document.getElementById('ghToken').value.trim();
  localStorage.setItem('slowbuild_gh_token', t);
  localStorage.setItem('slowbuild_gh_owner', document.getElementById('ghOwner').value.trim());
  localStorage.setItem('slowbuild_gh_repo', document.getElementById('ghRepo').value.trim());
  showStatus('tokenStatus','Token 已保存','ok');
  loadProducts();
}

function checkToken(){
  showStatus('tokenStatus','检查中...','');
  ghAPI('products.json').then(function(){
    showStatus('tokenStatus','✅ 连接成功！','ok');
    loadProducts();
  }).catch(function(e){
    showStatus('tokenStatus','❌ 连接失败: '+e.message,'err');
  });
}

function showStatus(id, msg, cls){
  var el = document.getElementById(id);
  el.textContent = msg; el.className = 'status '+(cls||''); el.style.display='block';
}

// ══════════════════════════════════
// Product CRUD
// ══════════════════════════════════
function loadProducts(){
  ghAPI('products.json').then(function(d){
    products = JSON.parse(atob(d.content));
    renderProductList();
  }).catch(function(e){
    showStatus('saveStatus','加载失败: '+e.message,'err');
    document.getElementById('productList').innerHTML = '<span style="color:var(--muted)">加载失败，请检查 Token</span>';
  });
}

function renderProductList(){
  var el = document.getElementById('productList');
  if(!products.length){ el.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted)">暂无商品</div>'; return; }
  var h = '';
  products.forEach(function(p,i){
    h += '<div class="product-item">'+
      '<strong>'+p.id+'</strong>'+
      '<span>'+p.name['zh-CN']+'</span>'+
      '<span style="font-family:monospace">$'+p.price.toFixed(2)+'</span>'+
      '<div class="btn-row" style="margin:0">'+
        '<button class="btn small" onclick="editProduct('+i+')">✏️</button>'+
        '<button class="btn small" onclick="copyProduct('+i+')">📋</button>'+
      '</div></div>';
  });
  el.innerHTML = h;
}

function addProduct(){
  var id = prompt('商品 ID（英文标识，如 hinge1）：');
  if(!id) return;
  // Check dup
  if(products.some(function(p){return p.id===id})){ alert('ID 已存在！'); return; }
  products.push({
    id: id, image:'images/'+id+'.jpg', price:0,
    buyLink:'https://link.payoneer.com/Token?t=6DA42646128B4562913488D8DABA0DC3&src=pl',
    name:{en:'', 'zh-CN':'', 'zh-TW':''},
    desc:{en:'', 'zh-CN':'', 'zh-TW':''},
    specs:{en:[], 'zh-CN':[], 'zh-TW':[]},
    shipping:{en:'📦 Free worldwide shipping · Arrives in 7–20 days', 'zh-CN':'📦 全球包邮 · 7–20 天送达', 'zh-TW':'📦 全球包郵 · 7–20 天送達'}
  });
  renderProductList();
  editProduct(products.length-1);
}

function copyProduct(i){
  var id = prompt('新商品 ID：', products[i].id+'_copy');
  if(!id) return;
  if(products.some(function(p){return p.id===id})){ alert('ID 已存在！'); return; }
  var copy = JSON.parse(JSON.stringify(products[i]));
  copy.id = id;
  products.push(copy);
  renderProductList();
  editProduct(products.length-1);
}

function editProduct(i){
  editingIndex = i;
  var p = products[i];
  document.getElementById('editCard').style.display = 'block';
  document.getElementById('editTitle').textContent = '✏️ 编辑: ' + p.id;
  document.getElementById('editId').value = p.id;
  document.getElementById('eNameEN').value = p.name.en||'';
  document.getElementById('eNameCN').value = p.name['zh-CN']||'';
  document.getElementById('eNameTW').value = p.name['zh-TW']||'';
  document.getElementById('eDescEN').value = p.desc.en||'';
  document.getElementById('eDescCN').value = p.desc['zh-CN']||'';
  document.getElementById('eDescTW').value = p.desc['zh-TW']||'';
  document.getElementById('ePrice').value = p.price||0;
  document.getElementById('eImage').value = p.image||'';
  document.getElementById('eBuyLink').value = p.buyLink||'';
  document.getElementById('eShipEN').value = p.shipping.en||'';
  document.getElementById('eShipCN').value = p.shipping['zh-CN']||'';
  document.getElementById('eShipTW').value = p.shipping['zh-TW']||'';
  renderSpecs();
  document.getElementById('editCard').scrollIntoView({behavior:'smooth'});
}

function saveCurrent(){
  if(editingIndex<0) return;
  var p = products[editingIndex];
  var oldId = p.id;
  p.id = document.getElementById('editId').value.trim() || oldId;
  p.name = {en:document.getElementById('eNameEN').value, 'zh-CN':document.getElementById('eNameCN').value, 'zh-TW':document.getElementById('eNameTW').value};
  p.desc = {en:document.getElementById('eDescEN').value, 'zh-CN':document.getElementById('eDescCN').value, 'zh-TW':document.getElementById('eDescTW').value};
  p.price = parseFloat(document.getElementById('ePrice').value)||0;
  p.image = document.getElementById('eImage').value.trim();
  p.buyLink = document.getElementById('eBuyLink').value.trim();
  p.shipping = {en:document.getElementById('eShipEN').value, 'zh-CN':document.getElementById('eShipCN').value, 'zh-TW':document.getElementById('eShipTW').value};
  // Read specs
  var specLines = document.querySelectorAll('.spec-row');
  p.specs = {en:[], 'zh-CN':[], 'zh-TW':[]};
  specLines.forEach(function(row){
    var en = row.querySelector('.spec-en')?.value||'';
    var cn = row.querySelector('.spec-cn')?.value||'';
    var tw = row.querySelector('.spec-tw')?.value||'';
    if(en||cn||tw){ p.specs.en.push(en); p.specs['zh-CN'].push(cn); p.specs['zh-TW'].push(tw); }
  });
  // Update id in list if changed
  if(oldId !== p.id){
    var dup = products.some(function(x,i){return i!==editingIndex && x.id===p.id;});
    if(dup){ alert('ID 冲突！'); p.id=oldId; return; }
  }
  renderProductList();
  document.getElementById('editTitle').textContent = '✏️ 编辑: ' + p.id;
  showStatus('editStatus','✓ 已暂存（别忘了点"保存全部"提交到 GitHub）','ok');
}

function cancelEdit(){
  document.getElementById('editCard').style.display = 'none';
  editingIndex = -1;
}

function deleteCurrent(){
  if(editingIndex<0) return;
  if(!confirm('确定删除商品 "'+products[editingIndex].id+'"？')) return;
  products.splice(editingIndex,1);
  renderProductList();
  cancelEdit();
  showStatus('saveStatus','已标记删除（别忘了点"保存全部"提交）','');
}

// ══════════════════════════════════
// Save to GitHub
// ══════════════════════════════════
function saveAll(){
  var g = gh();
  if(!g.token){ alert('请先填写 GitHub Token！'); return; }
  
  showStatus('saveStatus','正在获取文件信息...','');
  
  // First get current file to get sha
  ghAPI('products.json').then(function(d){
    var sha = d.sha;
    var content = JSON.stringify(products, null, 2);
    return ghAPI('products.json', 'PUT', {
      message: 'Update products via admin',
      content: btoa(unescape(encodeURIComponent(content))),
      sha: sha,
      branch: g.branch
    });
  }).then(function(){
    showStatus('saveStatus','✅ 已保存并推送到 GitHub！Vercel 将自动部署。','ok');
  }).catch(function(e){
    showStatus('saveStatus','❌ 保存失败: '+e.message,'err');
  });
}

// ══════════════════════════════════
// Image Upload
// ══════════════════════════════════
function previewImage(){
  var file = document.getElementById('eImageFile').files[0];
  if(!file) return;
  var g = gh();
  if(!g.token){ alert('请先填写 Token！'); return; }
  
  var path = 'images/' + file.name;
  document.getElementById('eImage').value = path;
  showStatus('editStatus','正在上传图片...','');
  
  var reader = new FileReader();
  reader.onload = function(){
    var base64 = reader.result.split(',')[1];
    // Check if file exists first
    ghAPI(path).then(function(d){
      return ghAPI(path, 'PUT', {message:'Update '+path, content:base64, sha:d.sha, branch:g.branch});
    }).catch(function(){
      return ghAPI(path, 'PUT', {message:'Add '+path, content:base64, branch:g.branch});
    }).then(function(){
      showStatus('editStatus','✅ 图片已上传: '+path,'ok');
    }).catch(function(e){
      showStatus('editStatus','❌ 图片上传失败: '+e.message,'err');
    });
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════
// Specs Editor
// ══════════════════════════════════
function renderSpecs(){
  var p = editingIndex>=0 ? products[editingIndex] : null;
  var max = Math.max((p?.specs.en||[]).length, (p?.specs['zh-CN']||[]).length, (p?.specs['zh-TW']||[]).length, 1);
  var h = '';
  for(var i=0;i<max;i++){
    h += '<div class="spec-row">'+
      '<input class="spec-en" placeholder="EN" value="'+esc((p?.specs.en||[])[i]||'')+'">'+
      '<input class="spec-cn" placeholder="简体" value="'+esc((p?.specs['zh-CN']||[])[i]||'')+'">'+
      '<input class="spec-tw" placeholder="繁体" value="'+esc((p?.specs['zh-TW']||[])[i]||'')+'">'+
      '<button onclick="this.parentElement.remove()" title="删除">✕</button></div>';
  }
  document.getElementById('specsContainer').innerHTML = h;
}

function addSpecRow(){
  var div = document.createElement('div');
  div.className = 'spec-row';
  div.innerHTML = '<input class="spec-en" placeholder="EN"><input class="spec-cn" placeholder="简体"><input class="spec-tw" placeholder="繁体"><button onclick="this.parentElement.remove()" title="删除">✕</button>';
  document.getElementById('specsContainer').appendChild(div);
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Start
init();
</script>
</body>
</html>
