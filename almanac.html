  var seed=gzIdx*100+lm*7+ld*13;
  var db=gzIdx%12;
  var officer=getDayOfficer(lm,db);
  var yc=6+Math.floor(sRng(seed+1)*3);

  var jc=5+Math.floor(sRng(seed+3)*3);

function genTarot(y,m,d){
  var seed=y*10000+m*100+d;
  var deck=[];
  for(var i=0;i<22;i++)deck.push({t:'major',i:i,card:majorArcana[i]});
  for(var i=0;i<56;i++)deck.push({t:'minor',i:i,card:minorArcana[i],meaning:minorMeanings[i]});
  // Use date seed to select
  var idx=Math.floor(sRng(seed*17+53)*78);
  var card=deck[idx];
  var reversed=sRng(seed*19+67)>0.58; // ~42% chance reversed
  return{card:card,reversed:reversed};
}

function genHoroscopes(y,m,d){
  var ds=y*10000+m*100+d,cur=getZodiac(m,d),res=[];
  for(var i=0;i<12;i++){
    var stars=Math.min(5,Math.max(1,Math.floor(sRng(i*73+ds*137)*5)+1));
    var tpls=fortuneTemplates[stars];
    var ft=tpls[Math.floor(sRng(i*499+ds*271)*tpls.length)];
    var ln=Math.floor(sRng(i*111+ds*37)*10)+1;
    var lc=luckyColors[Math.floor(sRng(i*223+ds*59)*luckyColors.length)];
    var ld=directions[Math.floor(sRng(i*333+ds*73)*directions.length)];
    res.push({idx:i,sign:zodiacSigns[i],stars:stars,fortune:ft,lnum:ln,lcol:lc,ldir:ld,isCur:i===cur});
  }
  return res;
}

  H+='<div class="tarot-visual'+(tarot.reversed?' reversed':'')+'">'+(tarot.reversed?'🃏↯':'🃏')+'</div>';
  H+='<div class="tarot-info">';
  H+='<div class="tarot-name">'+tarot.card.card.n+'</div>';
  H+='<div class="tarot-en">'+tarot.card.card.en+'</div>';
  H+='<div class="tarot-pos '+(tarot.reversed?'reversed':'upright')+'">'+(tarot.reversed?'↯ 逆位':'↑ 正位')+'</div>';
  var tmean=tarot.card.meaning||tarot.card.card.m;
  H+='<div class="tarot-meaning">'+tmean+'</div>';
  H+='</div></div></div>';

  // --- I CHING ---
  var ilv=iching.lv;
  var ilvLabel=ilv==='good'?'吉':ilv==='fair'?'平':'慎';
  H+='<div class="card">';
  H+='<div class="sec-head"><span class="icon">☯️</span>六爻日卦</div>';
  H+='<div class="iching-inner">';
  H+='<div class="iching-visual">';
  H+='<div class="iching-hex">'+iching.t+'</div>';
  H+='<div class="iching-tri">'+iching.t[0]+iching.t[1]+' / '+iching.t[2]+iching.t[3]+'</div>';
  H+='</div>';
  H+='<div class="iching-info">';
  H+='<div class="iching-num">第'+(ichingHexagrams.indexOf(iching)+1)+'卦</div>';
  H+='<div class="iching-name">'+iching.n+'</div>';
  H+='<div class="iching-judge">'+iching.j+'</div>';
  H+='<div class="iching-level '+ilv+'">'+ilvLabel+'</div>';
  H+='</div></div></div>';

  // --- ZODIAC ---
  H+='<div class="card">';
  H+='<div class="sec-head"><span class="icon">✨</span>十二星座今日运势';
  if(curZodiac>=0)H+=' <span style="font-size:13px;font-weight:400;color:var(--teal);margin-left:8px;">今天属于 '+zodiacSigns[curZodiac].e+' '+zodiacSigns[curZodiac].n+'</span>';
  H+='</div>';
  H+='<div class="zodiac-grid">';
  for(var i=0;i<horoscopes.length;i++){
    var ho=horoscopes[i];
    H+='<div class="zodiac-card'+(ho.isCur?' highlight':'')+'">';
    H+='<div class="z-icon">'+ho.sign.e+'</div>';
    H+='<div class="z-name">'+ho.sign.n+'</div>';
    H+='<div class="z-stars">'+starHTML(ho.stars)+'</div>';
    H+='<div class="z-fortune">'+ho.fortune+'</div>';
    H+='<div class="z-meta"><span>🔢'+ho.lnum+'</span><span>🎨'+ho.lcol+'</span><span>🧭'+ho.ldir+'</span></div>';
    H+='</div>';
  }
  H+='</div></div>';

  document.getElementById('app').innerHTML=H;

  // Auto-refresh at midnight
  var mid=new Date();mid.setHours(24,0,0,0);
  setTimeout(function(){render();setInterval(render,86400000);},mid-new Date()+2000);
}

render();
</script>
</body>
</html>
